<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cinema Time TV</title><style>:root{--primary:#e50914;--bg:#0a0b0d;--card-bg:#14171c;--text:#fff;--focus-shadow:0 0 25px #e50914}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}body{background-color:var(--bg);color:var(--text);padding:40px;overflow-x:hidden}header{text-align:center;margin-bottom:50px}h1{color:var(--primary);font-size:3.5rem;margin-bottom:25px;letter-spacing:2px}.tabs{display:flex;justify-content:center;gap:25px;margin-bottom:35px}.tab-btn{background:var(--card-bg);color:#fff;border:3px solid transparent;padding:15px 40px;border-radius:35px;font-weight:bold;font-size:1.5rem;cursor:pointer;transition:.2s}.tab-btn.active{background:var(--primary)}.tab-btn:focus{border-color:#fff;box-shadow:var(--focus-shadow);outline:none;transform:scale(1.05)}.search-container{max-width:700px;margin:0 auto 50px}input{width:100%;padding:18px 30px;border-radius:35px;border:3px solid transparent;background:var(--card-bg);color:#fff;font-size:1.4rem;outline:none;text-align:center;transition:.2s}input:focus{border-color:var(--primary);box-shadow:var(--focus-shadow);background:#000}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:40px!important;max-width:1600px;margin:0 auto;padding:20px;padding-bottom:80px}.card{background:var(--card-bg);border-radius:16px;overflow:hidden;border:4px solid transparent;transition:transform .2s,border-color .2s;outline:none;margin:10px;box-shadow:0 4px 15px rgba(0,0,0,.5)}.card img{width:100%;height:340px;object-fit:cover;background:#222;display:block}.card-info{padding:20px 15px;text-align:center;background:#111}.card-title{font-size:1.2rem;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}.card:focus{transform:scale(1.08);border-color:var(--primary);box-shadow:var(--focus-shadow);z-index:10}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1000;justify-content:center;align-items:center}.modal-content{width:100%;height:100%;position:relative}iframe{width:100%;height:100%;border:none}.close-btn{position:absolute;top:20px;left:20px;background:var(--primary);color:#fff;border:3px solid transparent;padding:12px 25px;border-radius:8px;font-weight:bold;font-size:1.2rem;cursor:pointer;z-index:1100}.close-btn:focus{border-color:#fff;box-shadow:var(--focus-shadow);outline:none}</style></head><body><header><h1>Cinema Time TV 🎬</h1><div class="tabs"><button id="btn-movie" class="tab-btn active" onclick="switchType('movie')">الأفلام</button><button id="btn-series" class="tab-btn" onclick="switchType('series')">المسلسلات</button></div><div class="search-container"><input type="text" id="searchInp" placeholder="ابحث بالإنجليزية (مثال: Batman, John Wick)..." oninput="debounceSearch()"></div></header><div class="grid" id="mainGrid"><p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#666">جاري تحميل المحتوى للشاشة...</p></div><div class="modal" id="playerModal"><div class="modal-content"><button class="close-btn" id="closeBtn" onclick="closePlayer()">رجوع (X)</button><iframe id="videoFrame" allowfullscreen></iframe></div></div><script>const API_KEY='5848d668';let currentType='movie',isModalOpen=!1,searchTimeout;async function loadDefaultContent(){const e=document.getElementById('mainGrid');e.innerHTML='<p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#666">جاري التحميل...</p>';const t='movie'===currentType?'action':'drama';try{const a=await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${t}&type=${currentType}`),n=await a.json();if(e.innerHTML='','True'===n.Response&&n.Search){n.Search.forEach(e=>{e.Poster&&'N/A'!==e.Poster&&createCard(e)}),focusFirstCard()}else e.innerHTML='<p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#666">فشل تحميل المحتوى الافتراضي.</p>'}catch(t){console.error(t),e.innerHTML='<p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#666">خطأ في الاتصال بالسيرفر.</p>'}}function debounceSearch(){clearTimeout(searchTimeout);const e=document.getElementById('searchInp').value.trim();e?searchTimeout=setTimeout(()=>{executeSearch(e)},600):loadDefaultContent()}async function executeSearch(e){const t=document.getElementById('mainGrid');t.innerHTML='<p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#666">جاري البحث الحين...</p>';try{const a=await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(e)}&type=${currentType}`),n=await a.json();t.innerHTML='';'True'===n.Response&&n.Search?(n.Search.forEach(e=>{e.Poster&&'N/A'!==e.Poster&&createCard(e)}),focusFirstCard()):t.innerHTML='<p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#666">لا توجد نتائج مطابقة، تأكد من كتابة الاسم الصحيح بالإنجليزية.</p>'}catch(e){console.error(e),t.innerHTML='<p style="grid-column:1/-1;text-align:center;font-size:1.5rem;color:#e50914;">حدث خطأ أثناء البحث.</p>'}}function createCard(e){const t=document.getElementById('mainGrid'),a=document.createElement('div');a.className='card',a.tabIndex=0,a.onclick=()=>openPlayer(e.imdbID);const n=`https://images.weserv.nl/?url=${encodeURIComponent(e.Poster)}`;a.innerHTML=`<img src="${n}" alt="${e.Title}"><div class="card-info"><div class="card-title">${e.Title}</div></div>`,t.appendChild(a)}function switchType(e){currentType='movie'===e?'movie':'series',document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active')),document.getElementById(`btn-${e}`).classList.add
