<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Time TV</title>
    <style>
        :root { --primary: #e50914; --bg: #0a0b0d; --card-bg: #14171c; --text: #fff; --focus-shadow: 0 0 30px #e50914; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 0; overflow-x: hidden; }
        
        header { text-align: center; margin-bottom: 30px; padding: 0 40px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 25px; letter-spacing: 2px; }
        
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .tab-btn { background: var(--card-bg); color: white; border: 3px solid transparent; padding: 12px 35px; border-radius: 35px; font-weight: bold; font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); }
        .tab-btn:focus { border-color: white; box-shadow: var(--focus-shadow); outline: none; transform: scale(1.05); }

        .search-container { max-width: 700px; margin: 0 auto; }
        input { width: 100%; padding: 18px 30px; border-radius: 35px; border: 3px solid transparent; background: var(--card-bg); color: white; font-size: 1.4rem; outline: none; text-align: center; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: var(--focus-shadow); background: #000; }
        
        /* الواجهة الأفقية اللي طلبتها (جنب بعض) */
        .slider { 
            display: flex; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            gap: 30px; 
            padding: 40px 40px 60px; 
            scroll-behavior: smooth;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .slider::-webkit-scrollbar { display: none; }
        
        .card { 
            flex: 0 0 260px; 
            background: var(--card-bg); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 4px solid transparent; 
            transition: transform 0.3s ease, border-color 0.3s ease; 
            outline: none; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.6); 
            cursor: pointer; 
        }
        .card img { width: 100%; height: 380px; object-fit: cover; background: #222; display: block; }
        .card-info { padding: 20px 15px; text-align: center; background: #111; }
        .card-title { font-size: 1.2rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        
        .card:focus { transform: scale(1.15); border-color: var(--primary); box-shadow: var(--focus-shadow); z-index: 10; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
        .controls-bar { background: #111; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; border-bottom: 2px solid var(--primary); }
        .controls-bar input { width: 80px; padding: 10px; font-size: 1.2rem; border-radius: 8px; text-align: center; background: #222; color: white; border: 2px solid #333; }
        .controls-bar input:focus { border-color: var(--primary); outline: none; }
        .play-btn { background: var(--primary); color: white; padding: 10px 30px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .play-btn:focus, .play-btn:hover { background: white; color: var(--primary); box-shadow: var(--focus-shadow); outline: none; }
        .close-btn { background: #444; color: white; padding: 10px 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .close-btn:focus, .close-btn:hover { background: white; color: black; outline: none; }
        
        .iframe-container { flex: 1; width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Time TV 🎬</h1>
        <div class="tabs">
            <button id="btn-movie" class="tab-btn active" onclick="switchType('movie')">Movies</button>
            <button id="btn-series" class="tab-btn" onclick="switchType('series')">TV Shows</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInp" placeholder="Search (e.g., Batman)..." onkeypress="handleSearchEnter(event)">
        </div>
    </header>

    <div class="slider" id="mainSlider"></div>

    <div class="modal" id="playerModal">
        <div class="controls-bar" id="tvControls">
            <div id="episodeInputs" style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size:1.2rem; font-weight:bold;">Season:</span>
                <input type="number" id="seasonNum" value="1" min="1">
                <span style="font-size:1.2rem; font-weight:bold;">Episode:</span>
                <input type="number" id="episodeNum" value="1" min="1">
                <button class="play-btn" onclick="updateEpisode()">▶ Play</button>
            </div>
            <button class="close-btn" id="closeBtn" onclick="closePlayer()">Back (X)</button>
        </div>
        <div class="iframe-container">
            <iframe id="videoFrame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
    </div>

    <script>
        const API_KEY = '5848d668'; // العودة لمفتاح OMDb السليم والمفتوح للشاشات
        let currentType = 'movie'; 
        let currentId = '';
        let isModalOpen = false;

        async function fetchContent(term) {
            const slider = document.getElementById('mainSlider');
            try {
                // نطلب البيانات بنظام البحث الجماعي المتوافق مع حسابك
                const response = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(term)}&type=${currentType}`);
                const data = await response.json();
                
                slider.innerHTML = '';
                if (data.Response === "True" && data.Search) {
                    data.Search.forEach(item => {
                        if (item.Poster && item.Poster !== "N/A") createCard(item);
                    });
                    focusFirstCard();
                } else {
                    slider.innerHTML = '<p style="text-align:center; width: 100%; font-size: 1.5rem; color:#666;">No results found. Search in English.</p>';
                }
            } catch (error) {
                console.error(error);
                slider.innerHTML = '<p style="text-align:center; width: 100%; color:#e50914;">Connection Error. Try again.</p>';
            }
        }

        function loadDefaultContent() {
            document.getElementById('mainSlider').innerHTML = '<p style="text-align:center; width: 100%; font-size: 1.5rem; color:#666;">Loading...</p>';
            const term = currentType === 'movie' ? 'batman' : 'star';
            fetchContent(term);
        }

        function handleSearchEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const query = document.getElementById('searchInp').value.trim();
                if (!query) { loadDefaultContent(); } 
                else {
                    document.getElementById('mainSlider').innerHTML = '<p style="text-align:center; width: 100%; font-size: 1.5rem; color:#666;">Searching...</p>';
                    fetchContent(query);
                }
            }
        }

        function createCard(item) {
            const slider = document.getElementById('mainSlider');
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.onclick = () => openPlayer(item.imdbID);
            
            // استخدام رابط البوستر المباشر لـ OMDb لضمان السرعة القصوى
            card.innerHTML = `
                <img src="${item.Poster}" alt="${item.Title}">
                <div class="card-info">
                    <div class="card-title">${item.Title}</div>
                </div>
            `;
            slider.appendChild(card);
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            document.getElementById('searchInp').value = '';
            loadDefaultContent();
        }

        function focusFirstCard() {
            setTimeout(() => { 
                const first = document.querySelector('.card'); 
                if(first) {
                    first.focus(); 
                    first.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                }
            }, 300);
        }

        function openPlayer(id) {
            currentId = id;
            isModalOpen = true;
            const modal = document.getElementById('playerModal');
            const frame = document.getElementById('videoFrame');
            const inputs = document.getElementById('episodeInputs');
            
            if (currentType === 'movie') {
                inputs.style.display = 'none';
                frame.src = `https://vidsrc.cc/vidsrc.php?imdb=${id}`;
            } else {
                inputs.style.display = 'flex';
                document.getElementById('seasonNum').value = 1;
                document.getElementById('episodeNum').value = 1;
                frame.src = `https://vidsrc.cc/vidsrc.php?imdb=${id}&s=1&e=1`;
            }
            
            modal.style.display = 'flex';
            document.getElementById('closeBtn').focus();
        }

        function updateEpisode() {
            const s = document.getElementById('seasonNum').value || 1;
            const e = document.getElementById('episodeNum').value || 1;
            const frame = document.getElementById('videoFrame');
            frame.src = `https://vidsrc.cc/vidsrc.php?imdb=${currentId}&s=${s}&e=${e}`;
        }

        function closePlayer() {
            isModalOpen = false;
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('videoFrame').src = '';
            focusFirstCard();
        }

        document.addEventListener('keydown', function(e) {
            const active = document.activeElement;
            if ((e.key === 'Backspace' || e.key === 'Escape')) {
                if(active.tagName === 'INPUT') return;
                closePlayer();
            }
            if (!isModalOpen) {
                const elements = Array.from(document.querySelectorAll('.card, .tab-btn, input'));
                const index = elements.indexOf(active);
                if (index > -1) {
                    let nextActive;
                    
                    if (e.key === 'ArrowRight') nextActive = elements[index + 1];
                    else if (e.key === 'ArrowLeft') nextActive = elements[index - 1];
                    else if (e.key === 'ArrowDown' && active.tagName === 'INPUT') nextActive = document.querySelector('.card');
                    else if (e.key === 'ArrowUp' && active.classList.contains('card')) nextActive = document.getElementById('searchInp');
                    else if (e.key === 'Enter' && active.tagName !== 'INPUT') active.click();
                    
                    if (nextActive) { 
                        e.preventDefault(); 
                        nextActive.focus(); 
                        if(nextActive.classList.contains('card')) {
                            nextActive.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'center' });
                        }
                    }
                }
            }
        });

        loadDefaultContent();
    </script>
</body>
</html>
