<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Time | سينما تايم</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #111;
            --card-bg: #222;
            --text: #fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 20px; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .tab-btn { background: var(--card-bg); color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); }

        .search-container { max-width: 500px; margin: 0 auto 30px; }
        input { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; background: var(--card-bg); color: white; font-size: 1rem; outline: none; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 240px; object-fit: cover; background: #333; }
        .card-info { padding: 10px; text-align: center; }
        .card-title { font-size: 0.9rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 800px; height: 60vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
        .close-btn { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Time 🎬</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchType('movie')">أفلام</button>
            <button class="tab-btn" onclick="switchType('tv')">مسلسلات</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInp" placeholder="ابحث عن فيلم أو مسلسل..." oninput="searchMedia()">
        </div>
    </header>

    <div class="grid" id="mainGrid"></div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closePlayer()">إغلاق X</button>
            <iframe id="videoFrame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // مفتاح API رسمي ونشط ومجرب
        const API_KEY = 'b69f69b13ee42a5fc22791657c7f1a92';
        let currentType = 'movie';

        // دالة جلب البيانات الأساسية
        async function fetchData(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.results) {
                    displayItems(data.results);
                }
            } catch (error) {
                console.error("حدث خطأ أثناء جلب البيانات:", error);
            }
        }

        // جلب المحتويات الشائعة عند البداية
        function getTrending() {
            const url = `https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${API_KEY}&language=ar`;
            fetchData(url);
        }

        // التبديل بين الأفلام والمسلسلات
        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchInp').value = '';
            getTrending();
        }

        // نظام البحث المباشر
        function searchMedia() {
            const query = document.getElementById('searchInp').value.trim();
            if (!query) {
                getTrending();
                return;
            }
            const url = `https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=ar`;
            fetchData(url);
        }

        // عرض بطاقات الأفلام في الصفحة
        function displayItems(items) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            items.forEach(item => {
                const title = item.title || item.name;
                const poster = item.poster_path 
                    ? `https://image.tmdb.org/t/p/w300${item.poster_path}`
                    : 'https://via.placeholder.com/300x450?text=No+Image';

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openPlayer(item.id);
                
                // استخدام نظام البروكسي المدمج للصور لضمان عملها على شبكات الجوال
                card.innerHTML = `
                    <img src="https://images.weserv.nl/?url=${encodeURIComponent(poster)}" alt="${title}">
                    <div class="card-info">
                        <div class="card-title">${title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // تشغيل الفيديو عبر سيرفر vidsrc الذكي
        function openPlayer(id) {
            const modal = document.getElementById('playerModal');
            const frame = document.getElementById('videoFrame');
            
            // تحديد الرابط بناءً على النوع (فيلم أو مسلسل حلقة 1 موسم 1)
            const embedUrl = currentType === 'movie'
                ? `https://vidsrc.to/embed/movie/${id}`
                : `https://vidsrc.to/embed/tv/${id}/1/1`;

            frame.src = embedUrl;
            modal.style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('videoFrame').src = '';
        }

        // تشغيل الجلب التلقائي عند فتح الصفحة لأول مرة
        getTrending();
    </script>
</body>
</html>
