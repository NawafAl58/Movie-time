<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Time TV</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #0a0b0d;
            --card-bg: #14171c;
            --text: #fff;
            --focus-shadow: 0 0 25px #e50914;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px; overflow-x: hidden; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 25px; letter-spacing: 2px; }
        
        .tabs { display: flex; justify-content: center; gap: 25px; margin-bottom: 35px; }
        .tab-btn { background: var(--card-bg); color: white; border: 3px solid transparent; padding: 15px 40px; border-radius: 35px; font-weight: bold; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); }
        .tab-btn:focus { border-color: white; box-shadow: var(--focus-shadow); outline: none; transform: scale(1.05); }

        .search-container { max-width: 700px; margin: 0 auto 50px; }
        input { width: 100%; padding: 18px 30px; border-radius: 35px; border: 3px solid transparent; background: var(--card-bg); color: white; font-size: 1.4rem; outline: none; text-align: center; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: var(--focus-shadow); background: #000; }

        /* تفكيك التلاصق وإجبار الـ Grid على ترك مسافات واسعة */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 40px !important; /* مسافة إجبارية كبيرة بين العناصر */
            max-width: 1600px; 
            margin: 0 auto; 
            padding: 20px;
            padding-bottom: 80px; 
        }
        
        /* إضافة هوامش داخلية وخارجية لكل كارت لمنع الالتصاق نهائياً */
        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 4px solid transparent; 
            transition: transform 0.2s, border-color 0.2s; 
            outline: none;
            margin: 10px; /* هامش أمان خارجي */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* ضبط أبعاد الصورة بشكل مستقل لحمايتها من التمدد والتداخل */
        .card img { 
            width: 100%; 
            height: 340px; 
            object-fit: cover; 
            background: #222;
            display: block;
        }
        
        .card-info { padding: 20px 15px; text-align: center; background: #111; }
        .card-title { font-size: 1.2rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        
        .card:focus { transform: scale(1.08); border-color: var(--primary); box-shadow: var(--focus-shadow); z-index: 10; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; left: 20px; background: var(--primary); color: white; border: 3px solid transparent; padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; z-index: 1100; }
        .close-btn:focus { border-color: white; box-shadow: var(--focus-shadow); outline: none; }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Time TV 🎬</h1>
        <div class="tabs">
            <button id="btn-movie" class="tab-btn active" onclick="switchType('movie')">الأفلام</button>
            <button id="btn-series" class="tab-btn" onclick="switchType('series')">المسلسلات</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInp" placeholder="اضغط للكتابة والبحث بالإنجليزية (مثال: Batman)..." oninput="searchMedia()">
        </div>
    </header>

    <div class="grid" id="mainGrid">
        <p style="grid-column: 1/-1; text-align:center; font-size: 1.5rem; color:#666;">جاري تحميل المحتوى للشاشة...</p>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn" onclick="closePlayer()">رجوع (X)</button>
            <iframe id="videoFrame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // مفتاح OMDb الخاص بك المستقر والآمن
        const API_KEY = '5848d668';
        let currentType = 'movie'; 
        let isModalOpen = false;

        const defaultMovies = ['Batman', 'Avengers', 'Spiderman', 'John Wick', 'Inception', 'Gladiator', 'Interstellar', 'Joker'];
        const defaultSeries = ['Breaking Bad', 'Vikings', 'Chernobyl', 'The Witcher', 'Suits', 'Friends', 'Dark', 'Fargo'];

        async function loadDefaultContent() {
            const list = currentType === 'movie' ? defaultMovies : defaultSeries;
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            for (let title of list) {
                try {
                    const response = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&t=${encodeURIComponent(title)}&type=${currentType}`);
                    const item = await response.json();
                    if (item.Response === "True" && item.Poster !== "N/A") {
                        createCard(item);
                    }
                } catch (error) {
                    console.error("Error loading default:", error);
                }
            }
            focusFirstCard();
        }

        async function searchMedia() {
            const query = document.getElementById('searchInp').value.trim();
            if (!query) { loadDefaultContent(); return; }
            
            try {
                const response = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(query)}&type=${currentType}`);
                const data = await response.json();
                
                const grid = document.getElementById('mainGrid');
                grid.innerHTML = '';
                
                if (data.Response === "True") {
                    data.Search.forEach(item => {
                        if (item.Poster && item.Poster !== "N/A") {
                            createCard(item);
                        }
                    });
                    focusFirstCard();
                } else {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; font-size: 1.5rem; color:#666;">لا توجد نتائج مطابقة، ابحث بالإنجليزية.</p>';
                }
            } catch (error) {
                console.error("Search error:", error);
            }
        }

        function createCard(item) {
            const grid = document.getElementById('mainGrid');
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.onclick = () => openPlayer(item.imdbID);
            
            const safePoster = `https://images.weserv.nl/?url=${encodeURIComponent(item.Poster)}`;

            card.innerHTML = `
                <img src="${safePoster}" alt="${item.Title}">
                <div class="card-info">
                    <div class="card-title">${item.Title}</div>
                </div>
            `;
            grid.appendChild(card);
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            document.getElementById('searchInp').value = '';
            document.getElementById('mainGrid').innerHTML = '<p style="grid-column: 1/-1; text-align:center; font-size: 1.5rem; color:#666;">جاري تحميل القائمة الجديدة...</p>';
            loadDefaultContent();
        }

        function focusFirstCard() {
            setTimeout(() => {
                const firstCard = document.querySelector('.card');
                if (firstCard) firstCard.focus();
            }, 300);
        }

        function openPlayer(imdbID) {
            isModalOpen = true;
            const modal = document.getElementById('playerModal');
            const frame = document.getElementById('videoFrame');
            
            const embedUrl = currentType === 'movie'
                ? `https://vidsrc.to/embed/movie/${imdbID}`
                : `https://vidsrc.to/embed/tv/${imdbID}/1/1`;

            frame.src = embedUrl;
            modal.style.display = 'flex';
            document.getElementById('closeBtn').focus();
        }

        function closePlayer() {
            isModalOpen = false;
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('videoFrame').src = '';
            focusFirstCard();
        }

        document.addEventListener('keydown', function(e) {
            const active = document.activeElement;
            
            if ((e.key === 'Backspace' || e.key === 'Escape') && isModalOpen) {
                e.preventDefault();
                closePlayer();
                return;
            }

            if (isModalOpen) return;

            const cards = Array.from(document.querySelectorAll('.card, .tab-btn, input'));
            const index = cards.indexOf(active);

            if (index > -1) {
                let nextActive;
                const grid = document.getElementById('mainGrid');
                const columns = window.getComputedStyle(grid).getPropertyValue('grid-template-columns').split(' ').length;

                if (e.key === 'ArrowRight') {
                    nextActive = cards[index - 1] || cards[cards.length - 1];
                } else if (e.key === 'ArrowLeft') {
                    nextActive = cards[index + 1] || cards[0];
                } else if (e.key === 'ArrowDown') {
                    nextActive = cards[index + columns] || cards[index];
                } else if (e.key === 'ArrowUp') {
                    nextActive = cards[index - columns] || cards[0];
                } else if (e.key === 'Enter') {
                    active.click();
                }

                if (nextActive) {
                    e.preventDefault();
                    nextActive.focus();
                }
            }
        });

        loadDefaultContent();
    </script>
</body>
</html>
