<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Time TV</title>
    <style>
        :root { --primary: #e50914; --bg: #0a0b0d; --card-bg: #14171c; --text: #fff; --focus-shadow: 0 0 25px #e50914; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px; overflow-x: hidden; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 25px; letter-spacing: 2px; }
        
        .tabs { display: flex; justify-content: center; gap: 25px; margin-bottom: 35px; }
        .tab-btn { background: var(--card-bg); color: white; border: 3px solid transparent; padding: 15px 40px; border-radius: 35px; font-weight: bold; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); }
        .tab-btn:focus { border-color: white; box-shadow: var(--focus-shadow); outline: none; transform: scale(1.05); }
        
        .search-container { max-width: 700px; margin: 0 auto 50px; }
        input { width: 100%; padding: 18px 30px; border-radius: 35px; border: 3px solid transparent; background: var(--card-bg); color: white; font-size: 1.4rem; outline: none; text-align: center; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: var(--focus-shadow); background: #000; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 40px !important; max-width: 1600px; margin: 0 auto; padding: 20px; padding-bottom: 80px; }
        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 4px solid transparent; transition: transform 0.2s, border-color 0.2s; outline: none; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor:pointer; }
        .card img { width: 100%; height: 340px; object-fit: cover; background: #222; display: block; }
        .card-info { padding: 20px 15px; text-align: center; background: #111; }
        .card-title { font-size: 1.2rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .card:focus { transform: scale(1.08); border-color: var(--primary); box-shadow: var(--focus-shadow); z-index: 10; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
        .controls-bar { background: #111; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; border-bottom: 2px solid var(--primary); }
        .controls-bar input { width: 80px; padding: 10px; font-size: 1.2rem; border-radius: 8px; text-align: center; background: #222; color: white; border: 2px solid #333; }
        .controls-bar input:focus { border-color: var(--primary); }
        .play-btn { background: var(--primary); color: white; padding: 10px 30px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .play-btn:focus, .play-btn:hover { background: white; color: var(--primary); box-shadow: var(--focus-shadow); }
        .close-btn { background: #444; color: white; padding: 10px 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .close-btn:focus, .close-btn:hover { background: white; color: black; }
        
        .iframe-container { flex: 1; width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Time TV 🎬</h1>
        <div class="tabs">
            <button id="btn-movie" class="tab-btn active" onclick="switchType('movie')">Movies</button>
            <button id="btn-tv" class="tab-btn" onclick="switchType('tv')">TV Shows</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInp" placeholder="Search movies or series..." oninput="debounceSearch()">
        </div>
    </header>

    <div class="grid" id="mainGrid"></div>

    <div class="modal" id="playerModal">
        <div class="controls-bar" id="tvControls" style="display:none;">
            <span style="font-size:1.2rem; font-weight:bold;">Season:</span>
            <input type="number" id="seasonNum" value="1" min="1">
            
            <span style="font-size:1.2rem; font-weight:bold;">Episode:</span>
            <input type="number" id="episodeNum" value="1" min="1">
            
            <button class="play-btn" onclick="updateEpisode()">▶ Play</button>
            <button class="close-btn" id="closeBtn" onclick="closePlayer()">Back (X)</button>
        </div>
        
        <div class="controls-bar" id="movieControls" style="display:none;">
            <button class="close-btn" id="closeBtnMovie" onclick="closePlayer()">Back (X)</button>
        </div>

        <div class="iframe-container">
            <iframe id="videoFrame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_KEY = 'Fe4b6ec1a6183fddf681565506956216';
        let currentType = 'movie'; 
        let isModalOpen = false;
        let currentMediaId = '';
        let searchTimeout;

        async function fetchData(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.results) { displayItems(data.results); }
            } catch (error) {
                console.error("Error fetching:", error);
                document.getElementById('mainGrid').innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#e50914;">Loading failed. Check connection or API key.</p>';
            }
        }

        function getTrending() {
            document.getElementById('mainGrid').innerHTML = '<p style="grid-column: 1/-1; text-align:center; font-size: 1.5rem; color:#666;">Loading trends...</p>';
            // تم تغيير الرابط إلى https بالكامل واللغة إلى إنجليزي لضمان الاستجابة السريعة
            fetchData(`https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${API_KEY}&language=en-US`);
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            document.getElementById('searchInp').value = '';
            getTrending();
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchInp').value.trim();
            if (!query) { getTrending(); return; }
            
            searchTimeout = setTimeout(() => {
                document.getElementById('mainGrid').innerHTML = '<p style="grid-column: 1/-1; text-align:center; font-size: 1.5rem; color:#666;">Searching...</p>';
                fetchData(`https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=en-US`);
            }, 600);
        }

        function displayItems(items) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            let count = 0;
            items.forEach(item => {
                const title = item.title || item.name;
                if(!item.poster_path) return;
                count++;
                
                const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = 0;
                card.onclick = () => openPlayer(item.id);
                
                card.innerHTML = `
