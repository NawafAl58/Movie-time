<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة البث</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.search{
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
}

.hero{
    height:500px;
    background:url('banner.jpg') center/cover;
    display:flex;
    align-items:end;
    padding:40px;
}

.hero h1{
    font-size:48px;
}

.section{
    padding:30px;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#1b1b1b;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    margin:0;
}
</style>
</head>

<body>

<header>
    <div class="logo">STREAM</div>
    <input type="text" class="search" placeholder="ابحث...">
</header>

<div class="hero">
    <h1>أحدث الإضافات</h1>
</div>

<div class="section">
    <h2>الأفلام</h2>

    <div class="movies">

        <div class="card">
            <img src="poster1.jpg">
            <h3>عنوان الفيلم</h3>
        </div>

        <div class="card">
            <img src="poster2.jpg">
            <h3>عنوان الفيلم</h3>
        </div>

        <div class="card">
            <img src="poster3.jpg">
            <h3>عنوان الفيلم</h3>
        </div>

    </div>
</div>

</body>
</html>
