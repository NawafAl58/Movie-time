<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما تايم | أفلام ومسلسلات مترجمة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #111; color: #fff; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 6%;
            position: fixed;
            width: 100%; top: 0; z-index: 1000;
            background-color: rgba(12, 12, 12, 0.95);
            border-bottom: 1px solid #222;
        }
        .logo { color: #e50914; font-size: 26px; font-weight: 700; cursor: pointer; }
        .search-box { position: relative; display: flex; align-items: center; width: 300px; }
        .search-box input {
            width: 100%; padding: 10px 40px 10px 15px; background: #222; border: 1px solid #444;
            color: #fff; border-radius: 25px; outline: none; font-size: 14px; transition: 0.3s;
        }
        .search-box input:focus { border-color: #e50914; background: #000; }
        .search-box i { position: absolute; right: 15px; color: #b3b3b3; }

        .main-container { padding: 100px 6% 40px 6%; min-height: 100vh; }
        
        .player-container { display: none; margin-bottom: 40px; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .player-header { padding: 15px 20px; background: #1c1c1c; display: flex; justify-content: space-between; align-items: center; }
        .player-header h3 { font-size: 18px; color: #fff; }
        .btn-close-player { background: #e50914; color: #fff; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .section-title { font-size: 22px; font-weight: 600; margin: 25px 0 15px 0; border-right: 4px solid #e50914; padding-right: 10px; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .movie-card { position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; aspect-ratio: 2/3; background-color: #222; transition: transform 0.2s; }
        .movie-card:hover { transform: scale(1.05); z-index: 2; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; background: #222; }
        
        .movie-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 40%, transparent);
            opacity: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; transition: opacity 0.2s;
        }
        .movie-card:hover .movie-overlay { opacity: 1; }
        .movie-card-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .movie-card-meta { display: flex; justify-content: space-between; font-size: 11px; color: #b3b3b3; }
        .rating { color: #f1c40f; }

        footer { border-top: 1px solid #222; padding: 30px 6%; text-align: center; color: #555; font-size: 14px; margin-top: 40px; }

        @media (max-width: 768px) {
            .navbar { padding: 15px 4%; flex-direction: column; gap: 15px; }
            .search-box { width: 100%; }
            .main-container { padding-top: 140px; padding-left: 4%; padding-right: 4%; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo" onclick="window.location.reload()">سينماـتايم</div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل..." oninput="handleSearch()">
        </div>
    </header>

    <main class="main-container">
        
        <section class="player-container" id="playerContainer">
            <div class="player-header">
                <h3 id="playingTitle">اسم الفيلم المعروض</h3>
                <button class="btn-close-player" onclick="closePlayer()">إغلاق المشغل</button>
            </div>
            <div class="video-wrapper">
                <iframe id="videoIframe" src="" allowfullscreen></iframe>
            </div>
        </section>

        <h2 class="section-title" id="gridTitle">أفلام رائجة الآن</h2>
        
        <div class="movie-grid" id="movieGrid">
            <p style="padding:20px; color:#666;">جاري تحميل مكتبة الأفلام...</p>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 سينما تايم. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        // استخدام سيرفر صور وسيط ومفتوح لتخطي حجب الجوالات
        const IMG_URL = 'https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500';

        window.onload = function() {
            getTrendingMovies();
        }

        async function getTrendingMovies() {
            try {
                const res = await fetch('https://api.themoviedb.org/3/trending/movie/week?api_key=84a601267bbf0800c25a5857fa231e32&language=ar');
                const data = await res.json();
                displayMovies(data.results);
            } catch (error) {
                const backupData = [
                    { id: 519182, title: "Despicable Me 4", poster_path: "/w9kR8qbmQ0w606vMTm6K60vXwue.jpg", vote_average: 8.1, release_date: "2024" },
                    { id: 1022789, title: "Inside Out 2", poster_path: "/vpnVM9B6mSbaRK8gZ6SscHLHM4G.jpg", vote_average: 8.4, release_date: "2024" },
                    { id: 823464, title: "Godzilla x Kong", poster_path: "/z1p3Z3U6f2jgm86C9S68666IeAs.jpg", vote_average: 7.2, release_date: "2024" },
                    { id: 653346, title: "Kingdom of the Planet of the Apes", poster_path: "/gKkl37B6A17ZhFUwg6bDGg2zGbb.jpg", vote_average: 7.1, release_date: "2024" }
                ];
                displayMovies(backupData);
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';

            movies.forEach(movie => {
                if(!movie.poster_path) return;

                // تنظيف مسار الصورة وربطه بالخادم الوسيط المفتوح
                const purePosterPath = movie.poster_path.replace(/^\//, '');
                const finalImgSrc = `https://images.weserv.nl/?url=image.tmdb.org/t/p/w500/${purePosterPath}`;

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${finalImgSrc}" alt="${movie.title || movie.name}" onerror="this.src='https://via.placeholder.com/160x240/222/fff?text=Cinema'">
                    <div class="movie-overlay">
                        <div class="movie-card-title">${movie.title || movie.name}</div>
                        <div class="movie-card-meta">
                            <span class="rating"><i class="fas fa-star"></i> ${movie.vote_average.toFixed(1)}</span>
                            <span>${movie.release_date ? movie.release_date.substring(0,4) : '2026'}</span>
                        </div>
                    </div>
                `;
                
                const mediaType = movie.title ? 'movie' : 'tv';
                card.onclick = () => playMedia(movie.id, movie.title || movie.name, mediaType);
                
                grid.appendChild(card);
            });
        }

        async function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const gridTitle = document.getElementById('gridTitle');

            if(query.length === 0) {
                gridTitle.innerText = "أفلام رائجة الآن";
                getTrendingMovies();
                return;
            }

            gridTitle.innerText = `نتائج البحث عن: ${query}`;
            
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=84a601267bbf0800c25a5857fa231e32&query=${encodeURIComponent(query)}&language=ar`);
                const data = await response.json();
                displayMovies(data.results);
            } catch (error) {
                console.error("خطأ أثناء البحث");
            }
        }

        function playMedia(id, title, type) {
            const playerContainer = document.getElementById('playerContainer');
            const videoIframe = document.getElementById('videoIframe');
            const playingTitle = document.getElementById('playingTitle');

            playingTitle.innerText = `جاري عرض: ${title}`;
            videoIframe.src = `https://vidsrc.to/embed/${type}/${id}`;
            playerContainer.style.display = 'block';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const videoIframe = document.getElementById('videoIframe');
            videoIframe.src = ''; 
            playerContainer.style.display = 'none';
        }
    </script>
</body>
</html>
