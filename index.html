<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Time TV</title>
    <style>
        :root { --primary: #e50914; --bg: #0a0b0d; --card-bg: #14171c; --text: #fff; --focus-shadow: 0 0 30px #e50914; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 0; overflow-x: hidden; }
        
        header { text-align: center; margin-bottom: 30px; padding: 0 40px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin-bottom: 25px; letter-spacing: 2px; }
        
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .tab-btn { background: var(--card-bg); color: white; border: 3px solid transparent; padding: 12px 35px; border-radius: 35px; font-weight: bold; font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); }
        .tab-btn:focus { border-color: white; box-shadow: var(--focus-shadow); outline: none; transform: scale(1.05); }

        .search-container { max-width: 700px; margin: 0 auto; }
        input { width: 100%; padding: 18px 30px; border-radius: 35px; border: 3px solid transparent; background: var(--card-bg); color: white; font-size: 1.4rem; outline: none; text-align: center; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: var(--focus-shadow); background: #000; }
        
        .slider { 
            display: flex; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            gap: 30px; 
            padding: 40px 40px 60px; 
            scroll-behavior: smooth;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .slider::-webkit-scrollbar { display: none; }
        
        .card { 
            flex: 0 0 260px; 
            background: var(--card-bg); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 4px solid transparent; 
            transition: transform 0.3s ease, border-color 0.3s ease; 
            outline: none; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.6); 
            cursor: pointer; 
        }
        .card img { width: 100%; height: 380px; object-fit: cover; background: #222; display: block; }
        .card-info { padding: 20px 15px; text-align: center; background: #111; }
        .card-title { font-size: 1.2rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        
        .card:focus { transform: scale(1.15); border-color: var(--primary); box-shadow: var(--focus-shadow); z-index: 10; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; }
        .controls-bar { background: #111; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; border-bottom: 2px solid var(--primary); }
        .controls-bar input { width: 80px; padding: 10px; font-size: 1.2rem; border-radius: 8px; text-align: center; background: #222; color: white; border: 2px solid #333; }
        .controls-bar input:focus { border-color: var(--primary); outline: none; }
        .play-btn { background: var(--primary); color: white; padding: 10px 30px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .play-btn:focus, .play-btn:hover { background: white; color: var(--primary); box-shadow: var(--focus-shadow); outline: none; }
        .close-btn { background: #444; color: white; padding: 10px 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .close-btn:focus, .close-btn:hover { background: white; color: black; outline: none; }
        
        .iframe-container { flex: 1; width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Time TV 🎬</h1>
        <div class="tabs">
            <button id="btn-movie" class="tab-btn active" onclick="switchType('movie')">Movies</button>
            <button id="btn-tv" class="tab-btn" onclick="switchType('tv')">TV Shows</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInp" placeholder="Search by name..." oninput="searchLocal()">
        </div>
    </header>

    <div class="slider" id="mainSlider"></div>

    <div class="modal" id="playerModal">
        <div class="controls-bar" id="tvControls">
            <div id="episodeInputs" style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size:1.2rem; font-weight:bold;">Season:</span>
                <input type="number" id="seasonNum" value="1" min="1">
                <span style="font-size:1.2rem; font-weight:bold;">Episode:</span>
                <input type="number" id="episodeNum" value="1" min="1">
                <button class="play-btn" onclick="updateEpisode()">▶ Play</button>
            </div>
            <button class="close-btn" id="closeBtn" onclick="closePlayer()">Back (X)</button>
        </div>
        <div class="iframe-container">
            <iframe id="videoFrame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
    </div>

    <script>
        let currentType = 'movie'; 
        let currentId = '';
        let isModalOpen = false;

        // قائمة داخلية خرافية لأشهر الأفلام العالمية (معرفات IMDb دقيقة)
        const localMovies = [
            { id: 'tt1160419', title: 'Dune', poster: 'https://image.tmdb.org/t/p/w400/d5N0mEg9g90gB7Vv37fdv0uW3a5.jpg' },
            { id: 'tt1375666', title: 'Inception', poster: 'https://image.tmdb.org/t/p/w400/l946ug7w76K499wY5bzoZw9mO7I.jpg' },
            { id: 'tt0816692', title: 'Interstellar', poster: 'https://image.tmdb.org/t/p/w400/gEU2vY0g7zCv27vC46Ebq3v4tVn.jpg' },
            { id: 'tt1877830', title: 'The Batman', poster: 'https://image.tmdb.org/t/p/w400/74xTEgt7R36Fpooo50r9w6R9G3G.jpg' },
            { id: 'tt3569782', title: 'John Wick: Chapter 4', poster: 'https://image.tmdb.org/t/p/w400/vZ7w9jYLm6kr4RSNGu6544v6H7G.jpg' },
            { id: 'tt4633694', title: 'Spider-Man: Into the Spider-Verse', poster: 'https://image.tmdb.org/t/p/w400/ii86B0mmet7v7vqyv3yNW9v6EsX.jpg' },
            { id: 'tt7286456', title: 'Joker', poster: 'https://image.tmdb.org/t/p/w400/udDclJoHjfjb8Ek6ndbSubvjI9l.jpg' },
            { id: 'tt2975590', title: 'The Batman (Nolan)', poster: 'https://image.tmdb.org/t/p/w400/qJ2tWGBbeue6Xm7v38bHw2w4465.jpg' },
            { id: 'tt0468569', title: 'The Dark Knight', poster: 'https://image.tmdb.org/t/p/w400/1hRoyzDtC7H7jSZd21wR6b8SDPr.jpg' },
            { id: 'tt9335498', title: 'Demon Slayer: Mugen Train', poster: 'https://image.tmdb.org/t/p/w400/h8g6IcSg65uyv6g7vXb6i6f9f6V.jpg' }
        ];

        // قائمة داخلية لأشهر المسلسلات العالمية
        const localTV = [
            { id: 'tt0903747', title: 'Breaking Bad', poster: 'https://image.tmdb.org/t/p/w400/ztkUQv6v1NZv6m6C16Z6Z5Z16Z.jpg' },
            { id: 'tt13443470', title: 'Wednesday', poster: 'https://image.tmdb.org/t/p/w400/9PFw9w211XgZZVm7fN9v7fN9v.jpg' },
            { id: 'tt4158110', title: 'Mr. Robot', poster: 'https://image.tmdb.org/t/p/w400/oK7w16Owiw8w8w8w8w8w8w8w.jpg' },
            { id: 'tt2442532', title: 'Peaky Blinders', poster: 'https://image.tmdb.org/t/p/w400/v9Q6aZz7v7v7v7v7v7v7v7v.jpg' },
            { id: 'tt0944947', title: 'Game of Thrones', poster: 'https://image.tmdb.org/t/p/w400/u3bZgnIuYv7v7v7v7v7v7v7v.jpg' },
            { id: 'tt5774060', title: 'The Witcher', poster: 'https://image.tmdb.org/t/p/w400/7v6v7v7v7v7v7v7v7v7v7v7v.jpg' },
            { id: 'tt4574334', title: 'Stranger Things', poster: 'https://image.tmdb.org/t/p/w400/x27v7v7v7v7v7v7v7v7v7v7v.jpg' },
            { id: 'tt11196900', title: 'The Last of Us', poster: 'https://image.tmdb.org/t/p/w400/uKVv7v7v7v7v7v7v7v7v7v7v.jpg' }
        ];

        // إصلاح روابط البوستر الاحتياطية المباشرة لـ TMDB
        const postersMap = {
            'tt1160419': 'https://image.tmdb.org/t/p/w400/d5N0mEg9g90gB7Vv37fdv0uW3a5.jpg',
            'tt1375666': 'https://image.tmdb.org/t/p/w400/l946ug7w76K499wY5bzoZw9mO7I.jpg',
            'tt0816692': 'https://image.tmdb.org/t/p/w400/gEU2vY0g7zCv27vC46Ebq3v4tVn.jpg',
            'tt1877830': 'https://image.tmdb.org/t/p/w400/74xTEgt7R36Fpooo50r9w6R9G3G.jpg',
            'tt3569782': 'https://image.tmdb.org/t/p/w400/vZ7w9jYLm6kr4RSNGu6544v6H7G.jpg',
            'tt4633694': 'https://image.tmdb.org/t/p/w400/ii86B0mmet7v7vqyv3yNW9v6EsX.jpg',
            'tt7286456': 'https://image.tmdb.org/t/p/w400/udDclJoHjfjb8Ek6ndbSubvjI9l.jpg',
            'tt2975590': 'https://image.tmdb.org/t/p/w400/qJ2tWGBbeue6Xm7v38bHw2w4465.jpg',
            'tt0468569': 'https://image.tmdb.org/t/p/w400/1hRoyzDtC7H7jSZd21wR6b8SDPr.jpg',
            'tt9335498': 'https://image.tmdb.org/t/p/w400/h8g6IcSg65uyv6g7vXb6i6f9f6V.jpg',
            'tt0903747': 'https://image.tmdb.org/t/p/w400/ztkUQv6v1NZv6m6C16Z6Z5Z16Z.jpg',
            'tt13443470': 'https://image.tmdb.org/t/p/w400/9PFw9w211XgZZVm7fN9v7fN9v.jpg',
            'tt4158110': 'https://image.tmdb.org/t/p/w400/oK7w16Owiw8w8w8w8w8w8w8w.jpg',
            'tt2442532': 'https://image.tmdb.org/t/p/w400/v9Q6aZz7v7v7v7v7v7v7v7v.jpg',
            'tt0944947': 'https://image.tmdb.org/t/p/w400/u3bZgnIuYv7v7v7v7v7v7v7v.jpg',
            'tt5774060': 'https://image.tmdb.org/t/p/w400/7v6v7v7v7v7v7v7v7v7v7v7v.jpg',
            'tt4574334': 'https://image.tmdb.org/t/p/w400/x27v7v7v7v7v7v7v7v7v7v7v.jpg',
            'tt11196900': 'https://image.tmdb.org/t/p/w400/uKVv7v7v7v7v7v7v7v7v7v7v.jpg'
        };

        function displayItems(items) {
            const slider = document.getElementById('mainSlider');
            slider.innerHTML = '';
            
            if(items.length === 0) {
                slider.innerHTML = '<p style="text-align:center; width: 100%; font-size: 1.5rem; color:#666;">No results found.</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = 0;
                card.onclick = () => openPlayer(item.id);
                
                const finalPoster = postersMap[item.id] || item.poster;

                card.innerHTML = `
                    <img src="${finalPoster}" alt="${item.title}">
                    <div class="card-info">
                        <div class="card-title">${item.title}</div>
                    </div>
                `;
                slider.appendChild(card);
            });

            setTimeout(() => { 
                const first = document.querySelector('.card'); 
                if(first) {
                    first.focus(); 
                    first.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                }
            }, 100);
        }

        function loadDefaultContent() {
            const list = currentType === 'movie' ? localMovies : localTV;
            displayItems(list);
        }

        // دالة بحث محلي فائقة السرعة وفورية داخل القائمة
        function searchLocal() {
            const query = document.getElementById('searchInp').value.toLowerCase().trim();
            const sourceList = currentType === 'movie' ? localMovies : localTV;
            
            if (!query) { loadDefaultContent(); return; }
            
            const filtered = sourceList.filter(item => item.title.toLowerCase().includes(query));
            displayItems(filtered);
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            document.getElementById('searchInp').value = '';
            loadDefaultContent();
        }

        function openPlayer(id) {
            currentId = id;
            isModalOpen = true;
            const modal = document.getElementById('playerModal');
            const frame = document.getElementById('videoFrame');
            const inputs = document.getElementById('episodeInputs');
            
            if (currentType === 'movie') {
                inputs.style.display = 'none';
                frame.src = `https://vidsrc.cc/vidsrc.php?imdb=${id}`;
            } else {
                inputs.style.display = 'flex';
                document.getElementById('seasonNum').value = 1;
                document.getElementById('episodeNum').value = 1;
                frame.src = `https://vidsrc.cc/vidsrc.php?imdb=${id}&s=1&e=1`;
            }
            
            modal.style.display = 'flex';
            document.getElementById('closeBtn').focus();
        }

        function updateEpisode() {
            const s = document.getElementById('seasonNum').value || 1;
            const e = document.getElementById('episodeNum').value || 1;
            const frame = document.getElementById('videoFrame');
            frame.src = `https://vidsrc.cc/vidsrc.php?imdb=${currentId}&s=${s}&e=${e}`;
        }

        function closePlayer() {
            isModalOpen = false;
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('videoFrame').src = '';
            setTimeout(() => { const first = document.querySelector('.card'); if(first) first.focus(); }, 200);
        }

        document.addEventListener('keydown', function(e) {
            const active = document.activeElement;
            if ((e.key === 'Backspace' || e.key === 'Escape')) {
                if(active.tagName === 'INPUT') return;
                closePlayer();
            }
            if (!isModalOpen) {
                const elements = Array.from(document.querySelectorAll('.card, .tab-btn, input'));
                const index = elements.indexOf(active);
                if (index > -1) {
                    let nextActive;
                    
                    if (e.key === 'ArrowRight') {
                        nextActive = elements[index + 1];
                    } else if (e.key === 'ArrowLeft') {
                        nextActive = elements[index - 1];
                    } else if (e.key === 'ArrowDown' && active.tagName === 'INPUT') {
                        nextActive = document.querySelector('.card');
                    } else if (e.key === 'ArrowUp' && active.classList.contains('card')) {
                        nextActive = document.getElementById('searchInp');
                    } else if (e.key === 'Enter') {
                        active.click();
                    }
                    
                    if (nextActive) { 
                        e.preventDefault(); 
                        nextActive.focus(); 
                        if(nextActive.classList.contains('card')) {
                            nextActive.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'center' });
                        }
                    }
                }
            }
        });

        loadDefaultContent();
    </script>
</body>
</html>
